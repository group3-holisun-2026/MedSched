spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/medsched_db
    username:
    password:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
  application:
    name: backend
  profiles:
    active: dev # Profilul care pornește implicit dacă nu specifici altul

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-32-bytes-minimum}
    access-token-expiration-ms: 900000 # 15 minute
    refresh-token-expiration-ms: 604800000 # 7 zile